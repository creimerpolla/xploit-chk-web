<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPLOIT GEN - Security Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050509;
            --card-bg: rgba(10, 10, 20, 0.9);
            --primary-accent: #00f2fe;
            --secondary-accent: #4facfe;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --border-color: rgba(0, 242, 254, 0.2);
            --neon-blue: #3d9be9;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary-accent);
            text-transform: uppercase;
            text-decoration: underline;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .tools-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        .tool-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--primary-accent);
            font-family: 'Fira Code', monospace;
            box-sizing: border-box;
            outline: none;
        }

        .flex-inputs { display: flex; gap: 10px; }
        
        .btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-primary { background: var(--neon-blue); color: white; width: 100%; }
        .btn-danger { background: #ff5252; color: white; width: 100%; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        textarea { height: 180px; margin-top: 15px; resize: none; font-size: 0.9rem; border-color: var(--border-color); }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-container">
        <header>
            <h1>XPLOIT GEN</h1>
        </header>

        <div class="tools-grid">
            <div class="tool-card">
                <h2>⚡ GENERADOR</h2>
                <div class="input-group">
                    <label>BIN (6-16 DÍGITOS)</label>
                    <input type="text" id="genBin" placeholder="400022xxxxxx">
                </div>
                <div class="flex-inputs input-group">
                    <div style="width: 50%;">
                        <label>MES</label>
                        <select id="genMonth">
                            {% for month in months %}<option value="{{ month }}">{{ month }}</option>{% endfor %}
                        </select>
                    </div>
                    <div style="width: 50%;">
                        <label>AÑO</label>
                        <select id="genYear">
                            {% for year in years %}<option value="{{ year }}">{{ year }}</option>{% endfor %}
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>CANTIDAD</label>
                    <input type="number" id="genQuantity" value="10" min="1" max="100">
                </div>
                <div class="flex-inputs">
                    <button class="btn btn-primary" onclick="generateCards()">GENERAR</button>
                    <button class="btn btn-danger" onclick="clearResults()">BORRAR</button>
                </div>
                <textarea id="genResults" readonly placeholder="Resultados aquí..."></textarea>
            </div>

            <div class="tool-card">
                <h2>🔍 BUSCADOR DE BIN</h2>
                <div class="input-group">
                    <label>INTRODUCE EL BIN</label>
                    <input type="text" id="checkBinInput" placeholder="400022">
                </div>
                <button class="btn btn-primary" onclick="checkBin()">BUSCAR INFO</button>
                <div id="binResults" style="margin-top: 20px; font-family: 'Fira Code'; color: var(--primary-accent);">
                    Esperando BIN...
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // FONDO INTERACTIVO
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70 },
                "color": { "value": "#00f2fe" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#4facfe", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" } },
                "modes": { "grab": { "distance": 140 } }
            }
        });

        async function generateCards() {
            const resultsArea = document.getElementById('genResults');
            resultsArea.value = 'Generando...';
            
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bin: document.getElementById('genBin').value,
                    month: document.getElementById('genMonth').value,
                    year: document.getElementById('genYear').value,
                    quantity: document.getElementById('genQuantity').value
                })
            });
            const data = await response.json();
            resultsArea.value = data.cards.join('\n');
        }

        function clearResults() {
            document.getElementById('genResults').value = '';
            document.getElementById('genBin').value = '';
        }

        async function checkBin() {
            const resultsArea = document.getElementById('binResults');
            const bin = document.getElementById('checkBinInput').value;
            resultsArea.innerHTML = 'Consultando...';
            
            const response = await fetch('/check_bin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bin: bin })
            });
            const data = await response.json();
            resultsArea.innerHTML = `RED: ${data.network}<br>TIPO: ${data.type}<br>PAÍS: ${data.country}`;
        }
    </script>
</body>
</html>
