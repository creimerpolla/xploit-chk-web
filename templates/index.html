<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPLOIT GEN - Security Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050509;
            --card-bg: rgba(10, 10, 20, 0.9);
            --primary-accent: #00f2fe;
            --secondary-accent: #4facfe;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --border-color: rgba(0, 242, 254, 0.2);
            --neon-blue: #3d9be9;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
        }

        /* --- Fondo de Partículas --- */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- Contenedor Principal --- */
        .main-container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 700;
            color: var(--primary-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: underline;
        }

        header p {
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 300;
        }

        /* --- Grid de Herramientas --- */
        .tools-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .tool-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 242, 254, 0.15);
        }

        .tool-card h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary-accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- Formularios y Inputs --- */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        input[type="text"], 
        input[type="number"], 
        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-accent);
        }

        .flex-inputs {
            display: flex;
            gap: 10px;
        }

        /* --- Botones --- */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            font-family: 'Poppins', sans-serif;
            background-color: var(--card-bg); /* Match inputs but solid */
            color: var(--text-main);
        }

        .btn-primary {
            background-color: var(--neon-blue);
            color: white;
            box-shadow: 0 0 10px rgba(61, 155, 233, 0.5);
        }

        .btn-primary:hover {
            background-color: #55acef;
            box-shadow: 0 0 15px rgba(85, 172, 239, 0.7);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* --- Área de Resultados --- */
        .result-area {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            min-height: 100px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-area .card-item {
            color: #a7ffeb;
            margin-bottom: 4px;
        }

        .bin-info-table {
            width: 100%;
            font-size: 0.9rem;
        }
        .bin-info-table td {
            padding: 5px 0;
        }
        .bin-info-table .label {
            color: var(--text-muted);
            width: 40%;
        }
        .bin-info-table .value {
            color: var(--primary-accent);
            font-weight: 600;
            text-align: right;
        }

        /* Scrollbar styling */
        .result-area::-webkit-scrollbar {
            width: 6px;
        }
        .result-area::-webkit-scrollbar-thumb {
            background-color: rgba(0, 242, 254, 0.3);
            border-radius: 3px;
        }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-container">
        <header>
            <h1>XPLOIT GEN</h1>
            <p>Security & Network Tool Suite</p>
        </header>

        <div class="tools-grid">
            
            <div class="tool-card">
                <h2><span>⚡</span> Generador</h2>
                
                <div class="input-group">
                    <label>Introduce tu BIN | MES | AÑO | CVV</label>
                    <input type="text" id="genBin" placeholder="4000 0000 0000 0000 | MM | YYYY | 123" maxlength="16">
                </div>

                <div class="flex-inputs input-group">
                    <div style="width: 50%;">
                        <label>Mes</label>
                        <select id="genMonth">
                            {% for month in months %}
                                <option value="{{ month }}">{{ month }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div style="width: 50%;">
                        <label>Año (Máx 2040)</label>
                        <select id="genYear">
                            {% for year in years %}
                                <option value="{{ year }}">{{ year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>CANTIDAD (1-100)</label>
                    <input type="number" id="genQuantity" value="10" min="1" max="100">
                </div>

                <button class="btn btn-primary" onclick="generateCards()">GENERAR</button>

                <div class="result-area" id="genResults">
                    <span style="color: var(--text-muted);">Los resultados aparecerán aquí...</span>
                </div>
            </div>

            <div class="tool-card">
                <h2><span>🔍</span> Buscador de BIN</h2>
                
                <div class="input-group">
                    <label>Introduce el BIN a consultar</label>
                    <input type="text" id="checkBinInput" placeholder="400000" maxlength="16">
                </div>

                <button class="btn btn-primary" onclick="checkBin()">Buscar</button>

                <div class="result-area" id="binResults">
                    <span style="color: var(--text-muted);">Busca un BIN...</span>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Configuración de particles.js
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#4facfe" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2fe", "opacity": 0.3, "width": 1 },
                "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false, "attract": { "enable": true, "rotateX": 600, "rotateY": 1200 } }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } }, "push": { "particles_nb": 4 } }
            },
            "retina_detect": true
        });

        // Lógica del Generador
        async function generateCards() {
            const bin = document.getElementById('genBin').value;
            const month = document.getElementById('genMonth').value;
            const year = document.getElementById('genYear').value;
            const quantity = document.getElementById('genQuantity').value;
            const resultsArea = document.getElementById('genResults');

            resultsArea.innerHTML = '<span style="color: var(--text-muted);">Generando...</span>';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bin, month, year, quantity })
                });
                const data = await response.json();
                
                resultsArea.innerHTML = '';
                if (data.cards.length === 0) {
                    resultsArea.innerHTML = '<span style="color: #ff5252;">Error: BIN inválido.</span>';
                } else {
                    data.cards.forEach(card => {
                        resultsArea.innerHTML += `<div class="card-item">${card}</div>`;
                    });
                }
            } catch (error) {
                resultsArea.innerHTML = '<span style="color: #ff5252;">Error de conexión.</span>';
            }
        }

        // Lógica del Buscador de BIN
        async function checkBin() {
            const bin = document.getElementById('checkBinInput').value;
            const resultsArea = document.getElementById('binResults');

            if (!bin) {
                resultsArea.innerHTML = '<span style="color: #ff5252;">Introduce un BIN.</span>';
                return;
            }

            resultsArea.innerHTML = '<span style="color: var(--text-muted);">Buscando...</span>';

            try {
                const response = await fetch('/check_bin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bin })
                });
                const data = await response.json();
                
                resultsArea.innerHTML = `
                    <table class="bin-info-table">
                        <tr><td class="label">BIN</td><td class="value">${data.bin}</td></tr>
                        <tr><td class="label">Red</td><td class="value">${data.network}</td></tr>
                        <tr><td class="label">Tipo</td><td class="value">${data.type}</td></tr>
                        <tr><td class="label">País</td><td class="value">${data.country}</td></tr>
                    </table>
                `;
            } catch (error) {
                resultsArea.innerHTML = '<span style="color: #ff5252;">Error de conexión.</span>';
            }
        }
    </script>
</body>
</html>
