<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPLOIT GEN - Professional Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050509;
            --card-bg: rgba(10, 10, 20, 0.9);
            --primary-accent: #00f2fe;
            --border-color: rgba(0, 242, 254, 0.3);
            --neon-blue: #3d9be9;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1;
        }

        .main-container {
            position: relative; z-index: 2;
            max-width: 900px; margin: 0 auto;
            padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        header h1 {
            font-size: 3.5rem; color: #fff;
            text-transform: uppercase; text-decoration: underline;
            letter-spacing: 4px; margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .tools-grid {
            width: 100%; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 30px;
            backdrop-filter: blur(12px);
        }

        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 8px; font-weight: 600; }

        input, select, textarea {
            width: 100%; padding: 12px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: var(--primary-accent);
            font-family: 'Fira Code', monospace; box-sizing: border-box; outline: none;
        }

        .btn {
            padding: 14px; border: none; border-radius: 8px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-primary { background: var(--neon-blue); color: white; width: 100%; }
        .btn-danger { background: #ff5252; color: white; width: 100%; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        textarea { height: 200px; margin-top: 15px; resize: none; font-size: 0.9rem; }
        
        .bin-row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 8px 0; font-size: 0.85rem; }

        /* Contenedor estético para el banner inferior */
        .ad-footer {
            margin-top: 40px;
            width: 100%;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--border-color);
            border-radius: 15px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <script src="https://pl29122932.profitablecpmratenetwork.com/5df8be4e6e215af44589790df604d624.js"></script>

    <div id="particles-js"></div>

    <div class="main-container">
        <header><h1>XPLOIT GEN</h1></header>

        <div class="tools-grid">
            <div class="tool-card">
                <div style="margin-bottom: 20px;">
                    <label>BIN | MES | AÑO | CVV</label>
                    <input type="text" id="genBin" placeholder="400022xxxxxx">
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label>MES</label>
                        <select id="genMonth">
                            {% for month in months %}<option value="{{ month }}">{{ month }}</option>{% endfor %}
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>AÑO</label>
                        <select id="genYear">
                            {% for year in years %}<option value="{{ year }}">{{ year }}</option>{% endfor %}
                        </select>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label>CANTIDAD</label>
                    <input type="number" id="genQuantity" value="10">
                </div>

                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" style="flex: 2;" onclick="generateCards()">GENERAR</button>
                    <button class="btn btn-danger" style="flex: 1;" onclick="clearResults()">BORRAR</button>
                </div>

                <textarea id="genResults" readonly placeholder="Resultados listos para copiar..."></textarea>
            </div>

            <div class="tool-card">
                <h2 style="font-size: 1.2rem; color: var(--primary-accent); margin-top: 0;">🔍 BUSCADOR DE BIN</h2>
                <div style="margin-bottom: 15px;">
                    <label>INTRODUCE BIN (6-8 DÍGITOS)</label>
                    <input type="text" id="checkBinInput" placeholder="400022">
                </div>
                <button class="btn btn-primary" onclick="checkBin()">BUSCAR INFO</button>
                
                <div id="binResults" style="margin-top: 25px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px;">
                    <span style="color: #666;">Esperando consulta...</span>
                </div>
            </div>
        </div>

        <div class="ad-footer">
            <p style="font-size: 0.65rem; color: #444; margin-bottom: 10px; letter-spacing: 2px;">PUBLICIDAD</p>
            <script async="async" data-cfasync="false" src="https://pl29122931.profitablecpmratenetwork.com/1a241210873bdb3091b4da54dadb0fb1/invoke.js"></script>
            <div id="container-1a241210873bdb3091b4da54dadb0fb1"></div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#00f2fe" },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2fe", "opacity": 0.2 },
                "move": { "enable": true, "speed": 1.5 }
            },
            "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
        });

        async function generateCards() {
            const results = document.getElementById('genResults');
            results.value = 'Generando...';
            const res = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bin: document.getElementById('genBin').value,
                    month: document.getElementById('genMonth').value,
                    year: document.getElementById('genYear').value,
                    quantity: document.getElementById('genQuantity').value
                })
            });
            const data = await res.json();
            results.value = data.cards.join('\n');
        }

        function clearResults() {
            document.getElementById('genResults').value = '';
            document.getElementById('genBin').value = '';
        }

        async function checkBin() {
            const area = document.getElementById('binResults');
            const bin = document.getElementById('checkBinInput').value;
            area.innerHTML = 'Buscando...';
            const res = await fetch('/check_bin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bin })
            });
            const data = await res.json();
            if(data.error) { area.innerHTML = data.error; return; }
            area.innerHTML = `
                <div class="bin-row"><span>BANCO:</span><b>${data.bank}</b></div>
                <div class="bin-row"><span>RED:</span><b>${data.network} ${data.brand}</b></div>
                <div class="bin-row"><span>TIPO:</span><b>${data.type}</b></div>
                <div class="bin-row"><span>PAÍS:</span><b>${data.country} ${data.flag}</b></div>
            `;
        }
    </script>
</body>
</html>
